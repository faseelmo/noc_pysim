# Model Parameters
NUM_MPN_LAYERS      : 3       # Number of conv layers in MPN
HIDDEN_CHANNELS     : 50      # Number of output node embeddings 
IS_HETERO           : True
HAS_SCHEDULER       : True
DEVICE              : 'cpu'   # 'cuda' or 'cpu'
LOSS_FN             : 'mse'   # 'mse' or 'mae' or 'huber'

# Normalization Constants
# Generate and processing time should be the same during data generation 
# and model training 
MAX_GENERATE        : 10
MAX_PROCESSING_TIME : 10
MAX_CYCLE           : 100

# Hyperparameters 
LEARNING_RATE       : 0.01
EPOCHS              : 1000 
WEIGHT_DECAY        : 0
BATCH_SIZE          : 128

# Load pre-trained model
LOAD_MODEL          : False
MODEL_PATH          : ''

# Data Path
DATA_DIR            : 'data/training_data/without_network'

# Results directory 
RESULTS_DIR         : 'training/results/without_network' 
SAVE_THRESHOLD      : 0.8


